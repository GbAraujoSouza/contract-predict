name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-backend:
    name: Validate backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          working-directory: backend

      - name: Install Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Validate application import
        run: uv run python -c "from app.main import app; assert app"

  validate-frontend:
    name: Validate frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy to Render
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - validate-backend
      - validate-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend
        env:
          RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: curl --fail --silent --show-error --request POST "$RENDER_BACKEND_DEPLOY_HOOK"

      - name: Deploy frontend
        env:
          RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: curl --fail --silent --show-error --request POST "$RENDER_FRONTEND_DEPLOY_HOOK"
